<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SJF CPU Scheduler</title>
    <link rel="stylesheet" href="style.css">
    
</head>
<body>
<div class="container">
    <h1>SJF CPU Scheduler (Non-Preemptive)</h1>

    <!-- ✅ Paste Dropdown HERE -->
    <div class="algorithm-select">
        <label for="algorithm">Select Algorithm:</label>
        <select id="algorithm">
            <option value="sjf" selected>SJF (Shortest Job First)</option>
            <option value="fcfs">FCFS (First Come First Serve)</option>
        </select>
    </div>

    <div class="input-group">
<div class="container">
    <h1>SJF CPU Scheduler (Non-Preemptive)</h1>

    <div class="input-group">
        <div class="input-field">
            <label>Process ID</label>
            <input type="text" id="pid" placeholder="e.g. P1">
        </div>
        <div class="input-field">
            <label>Arrival Time</label>
            <input type="number" id="arrival" min="0">
        </div>
        <div class="input-field">
            <label>Burst Time</label>
            <input type="number" id="burst" min="1">
        </div>
    </div>

    <div class="btn-container">
        <button class="btn-add" onclick="addProcess()">Add Process</button>
        <button class="btn-calc" onclick="calculateSJF()">Calculate Scheduling</button>
        <button class="btn-gantt" onclick="toggleGantt()">Show Gantt Chart</button>
        <button class="btn-avg" onclick="calculateAverage()">Calculate Average</button>
    </div>

    <table id="processTable">
        <thead>
            <tr>
                <th>Process ID</th>
                <th>Arrival Time</th>
                <th>Burst Time</th>
                <th>Completion Time</th>
                <th>Turnaround Time</th>
                <th>Waiting Time</th>
            </tr>
        </thead>
        <tbody id="tableBody"></tbody>
    </table>

    <div id="gantt-container">
        <h3>Gantt Chart</h3>
        <div id="gantt-chart" class="gantt-wrapper"></div>
    </div>

    <div id="avg-results" class="avg-results"></div>
</div>

<script src="script.js"></script>

</body>
</html>
